<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronicles — PhDnD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=19">
  <meta name="theme-color" content="#221a12">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>

  <header class="site-header">
    <h1 class="site-title"><a href="session.html">PhDnD</a></h1>
  </header>

  <main class="page">

    <!-- Table of contents -->
    <section id="toc">
      <h1>The Chronicles</h1>
      <p style="text-align: center;"><em>An annotated bibliography of adventures past.</em></p>
      <div class="gallery" id="gallery"></div>
    </section>

    <!-- Chapter reader -->
    <article id="reader" hidden>
      <h1 id="chapter-title"></h1>
      <div id="chapter-body"></div>
      <nav class="chapter-nav">
        <a href="#" id="prev-link"><span aria-hidden="true">❮</span> Previous</a>
        <a href="#contents" id="contents-link">Contents</a>
        <a href="#" id="next-link">Next <span aria-hidden="true">❯</span></a>
      </nav>
    </article>

  </main>

  <script>
    // To add a chapter: drop chronicles/chapterN.txt in the folder (first
    // line = title, blank-line-separated paragraphs after) and bump this.
    const NUM_CHAPTERS = 8;

    const tocSection = document.getElementById('toc');
    const gallery = document.getElementById('gallery');
    const reader = document.getElementById('reader');
    const chapters = []; // { title, paragraphs }

    function roman(n) {
      const table = [[10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
      let out = '';
      for (const [v, s] of table) while (n >= v) { out += s; n -= v; }
      return out;
    }

    async function fetchChapter(n) {
      const res = await fetch(`chronicles/chapter${n}.txt`);
      if (!res.ok) throw new Error(`chapter ${n} not found`);
      const lines = (await res.text()).split(/\r?\n/).filter(l => l.trim() !== '');
      return { title: lines[0], paragraphs: lines.slice(1) };
    }

    function showContents() {
      reader.hidden = true;
      tocSection.hidden = false;
    }

    function showChapter(n) {
      const ch = chapters[n - 1];
      if (!ch) { showContents(); return; }

      document.getElementById('chapter-title').textContent = ch.title;
      const body = document.getElementById('chapter-body');
      body.replaceChildren(...ch.paragraphs.map(text => {
        const p = document.createElement('p');
        p.textContent = text;
        return p;
      }));

      const prev = document.getElementById('prev-link');
      const next = document.getElementById('next-link');
      prev.style.visibility = n > 1 ? 'visible' : 'hidden';
      next.style.visibility = n < chapters.length ? 'visible' : 'hidden';
      prev.href = `#chapter-${n - 1}`;
      next.href = `#chapter-${n + 1}`;

      tocSection.hidden = true;
      reader.hidden = false;
      window.scrollTo(0, 0);
    }

    function route() {
      const m = location.hash.match(/^#chapter-(\d+)$/);
      if (m) showChapter(Number(m[1]));
      else showContents();
    }

    async function init() {
      const results = await Promise.allSettled(
        Array.from({ length: NUM_CHAPTERS }, (_, i) => fetchChapter(i + 1))
      );
      results.forEach((r, i) => {
        if (r.status !== 'fulfilled') return;
        chapters[i] = r.value;
        const n = i + 1;

        const card = document.createElement('a');
        card.className = 'chapter-card';
        card.href = `#chapter-${n}`;

        // artwork: chronicles/chapterN.png; ornament card when there is none
        const art = document.createElement('span');
        art.className = 'card-art';
        const img = document.createElement('img');
        img.src = `chronicles/chapter${n}.png`;
        img.loading = 'lazy';
        img.alt = '';
        img.addEventListener('error', () => {
          img.remove();
          art.classList.add('no-image');
          art.textContent = '❦';
        });
        art.appendChild(img);

        const title = document.createElement('span');
        title.className = 'card-title';
        title.textContent = r.value.title;

        card.append(art, title);
        gallery.appendChild(card);
      });
      if (chapters.length === 0) {
        const msg = location.protocol === 'file:'
          ? 'The chronicles cannot be read when this page is opened as a local file — visit the published site instead.'
          : 'No chronicles have been inscribed yet.';
        gallery.insertAdjacentHTML('beforebegin',
          `<p style="text-align:center;"><em>${msg}</em></p>`);
      }
      route();
    }

    window.addEventListener('hashchange', route);
    init();
  </script>


  <nav class="tab-bar" aria-label="App navigation">
    <a href="session.html"><span class="tab-icon">🕯️</span>Episode</a>
    <a href="chronicles.html" aria-current="page"><span class="tab-icon">📜</span>Chronicles</a>
    <a href="pip.html"><span class="tab-icon">🍄</span>Pip</a>
    <a href="luna.html"><span class="tab-icon">🌙</span>Luna</a>
  </nav>

</body>
</html>
